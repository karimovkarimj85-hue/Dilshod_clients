<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Дильшод — Админ</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--card:#151515;--border:#222;--text:#eee;--dim:#777;
  --accent:#c9a96e;--green:#2ecc71;--red:#e74c3c;--radius:14px}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}
.screen{display:none;padding:16px;animation:fadeIn .25s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

h2{font-size:18px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}

.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.stat-card .num{font-size:28px;font-weight:700;color:var(--accent)}
.stat-card .lbl{font-size:12px;color:var(--dim);margin-top:2px}

.cal-scroll{display:flex;gap:8px;overflow-x:auto;padding:4px 0 8px;scrollbar-width:none}
.cal-scroll::-webkit-scrollbar{display:none}
.day-card{flex:0 0 auto;width:64px;padding:10px 0;border-radius:var(--radius);text-align:center;
  background:var(--card);border:1px solid var(--border);cursor:pointer;transition:all .2s}
.day-card.off{opacity:.35;pointer-events:none}
.day-card.sel{border-color:var(--accent);background:#1a1610}
.day-card .wd{font-size:11px;color:var(--dim)}
.day-card .dd{font-size:18px;font-weight:700}
.day-card .mo{font-size:10px;color:var(--dim)}

.section-title{font-size:14px;font-weight:600;margin:16px 0 8px;color:var(--dim)}

.booking-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:center}
.bi-info .bi-time{font-weight:700;font-size:15px;color:var(--accent)}
.bi-info .bi-name{font-size:13px;margin-top:2px}
.bi-info .bi-phone{font-size:12px;color:var(--dim)}
.bi-actions{display:flex;gap:6px}
.bi-btn{width:36px;height:36px;border:none;border-radius:10px;font-size:16px;cursor:pointer;display:flex;
  align-items:center;justify-content:center}
.bi-btn.cancel{background:#2a1515;color:var(--red)}

.slot-row{display:grid;grid-template-columns:60px 1fr 60px;gap:8px;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--border)}
.sr-time{font-weight:600;font-size:14px}
.sr-status{font-size:13px}
.sr-status.free{color:var(--green)}
.sr-status.booked{color:var(--red)}
.sr-status.blocked{color:#f39c12}
.sr-status.past{color:#444}
.sr-action button{width:100%;padding:8px;border:none;border-radius:8px;font-size:12px;cursor:pointer}
.sr-action .block-btn{background:#2a2010;color:#f39c12}
.sr-action .unblock-btn{background:#1a3a25;color:var(--green)}

.empty{text-align:center;padding:30px 0;color:var(--dim);font-size:14px}
.loader{display:flex;justify-content:center;padding:30px 0}
.loader::after{content:'';width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.tabs{display:flex;gap:0;margin-bottom:16px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;
  background:var(--card);color:var(--dim);transition:all .2s}
.tab.active{background:var(--accent);color:#0a0a0a}

.toast{position:fixed;bottom:20px;left:16px;right:16px;padding:14px 18px;border-radius:var(--radius);
  font-size:14px;font-weight:500;z-index:999;transform:translateY(100px);opacity:0;transition:all .3s}
.toast.show{transform:none;opacity:1}
.toast.ok{background:#1a3a25;color:var(--green);border:1px solid #2a5a35}
.toast.err{background:#2a1515;color:var(--red);border:1px solid #3a2020}
</style>
</head>
<body>

<div id="s-main" class="screen active">
  <h2>👑 Панель управления</h2>
  <div class="stats" id="stats-grid">
    <div class="stat-card"><div class="num" id="st-today">-</div><div class="lbl">Сегодня</div></div>
    <div class="stat-card"><div class="num" id="st-tomorrow">-</div><div class="lbl">Завтра</div></div>
    <div class="stat-card"><div class="num" id="st-total">-</div><div class="lbl">Всего</div></div>
    <div class="stat-card"><div class="num" id="st-clients">-</div><div class="lbl">Клиентов</div></div>
  </div>

  <div class="section-title">📅 Выберите день</div>
  <div class="cal-scroll" id="admin-cal"></div>

  <div class="tabs" id="view-tabs" style="display:none">
    <div class="tab active" onclick="switchTab('bookings')">Записи</div>
    <div class="tab" onclick="switchTab('slots')">Слоты</div>
  </div>

  <div id="view-bookings"></div>
  <div id="view-slots" style="display:none"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram && Telegram.WebApp;
if (tg) tg.ready();
if (tg) tg.expand();

const API = (() => {
  const p = new URLSearchParams(location.search).get('api');
  if (p) return p.replace(/\/+$/, '');
  return location.origin;
})();
const initData = tg ? tg.initData : '';

const WD = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const MO = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

let selectedDate = new Date().toISOString().split('T')[0];
let currentTab = 'bookings';

function toast(msg, ok = true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (ok ? 'ok' : 'err') + ' show';
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function api(path, opts = {}) {
  const headers = {'Content-Type': 'application/json'};
  if (initData) headers['X-Init-Data'] = initData;
  const r = await fetch(API + path, {...opts, headers});
  return r.json();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'bookings') || (i === 1 && tab === 'slots'));
  });
  document.getElementById('view-bookings').style.display = tab === 'bookings' ? '' : 'none';
  document.getElementById('view-slots').style.display = tab === 'slots' ? '' : 'none';
}

async function loadStats() {
  try {
    const s = await api('/api/admin/stats');
    document.getElementById('st-today').textContent = s.today;
    document.getElementById('st-tomorrow').textContent = s.tomorrow;
    document.getElementById('st-total').textContent = s.total;
    document.getElementById('st-clients').textContent = s.clients;
  } catch (e) {}
}

async function loadCalendar() {
  const el = document.getElementById('admin-cal');
  try {
    const data = await api('/api/calendar');
    el.innerHTML = '';
    data.days.forEach(d => {
      const dt = new Date(d.date + 'T00:00:00');
      const card = document.createElement('div');
      card.className = 'day-card' + (d.off ? ' off' : '') + (d.date === selectedDate ? ' sel' : '');
      card.innerHTML =
        `<div class="wd">${WD[d.weekday]}</div>` +
        `<div class="dd">${dt.getDate()}</div>` +
        `<div class="mo">${MO[dt.getMonth()]}</div>`;
      if (!d.off) {
        card.onclick = () => {
          selectedDate = d.date;
          el.querySelectorAll('.day-card').forEach(c => c.classList.remove('sel'));
          card.classList.add('sel');
          loadDayData();
        };
      }
      el.appendChild(card);
    });
  } catch (e) { el.innerHTML = '<div class="empty">Ошибка</div>'; }
}

async function loadDayData() {
  document.getElementById('view-tabs').style.display = '';
  const bkEl = document.getElementById('view-bookings');
  const slEl = document.getElementById('view-slots');
  bkEl.innerHTML = '<div class="loader"></div>';
  slEl.innerHTML = '<div class="loader"></div>';

  try {
    const data = await api('/api/admin/bookings?date=' + selectedDate);

    // Bookings view
    bkEl.innerHTML = '';
    if (!data.bookings.length) {
      bkEl.innerHTML = '<div class="empty">Нет записей</div>';
    } else {
      data.bookings.forEach(b => {
        const item = document.createElement('div');
        item.className = 'booking-item';
        item.innerHTML =
          `<div class="bi-info">` +
            `<div class="bi-time">${b.book_time}</div>` +
            `<div class="bi-name">${b.name || b.ufn || '—'} ${b.username ? '@' + b.username : ''}</div>` +
            `<div class="bi-phone">${b.phone || '—'}</div>` +
          `</div>` +
          `<div class="bi-actions">` +
            `<button class="bi-btn cancel" onclick="adminCancel(${b.id})" title="Отменить">✕</button>` +
          `</div>`;
        bkEl.appendChild(item);
      });
    }

    // Slots view
    slEl.innerHTML = '';
    if (!data.slots.length) {
      slEl.innerHTML = '<div class="empty">Выходной</div>';
    } else {
      data.slots.forEach(s => {
        const row = document.createElement('div');
        row.className = 'slot-row';
        const statusText = {free: 'Свободно', booked: 'Занято', blocked: 'Заблок.', past: 'Прошло'}[s.status] || s.status;
        let actionHtml = '';
        if (s.status === 'free') {
          actionHtml = `<button class="block-btn" onclick="blockSlot('${selectedDate}','${s.time}')">🔒</button>`;
        } else if (s.status === 'blocked') {
          actionHtml = `<button class="unblock-btn" onclick="unblockSlot('${selectedDate}','${s.time}')">🔓</button>`;
        }
        row.innerHTML =
          `<div class="sr-time">${s.time}</div>` +
          `<div class="sr-status ${s.status}">${statusText}</div>` +
          `<div class="sr-action">${actionHtml}</div>`;
        slEl.appendChild(row);
      });
    }
  } catch (e) {
    bkEl.innerHTML = '<div class="empty">Ошибка загрузки</div>';
  }
}

async function adminCancel(bid) {
  if (!confirm('Отменить эту запись?')) return;
  const res = await api('/api/admin/cancel', {method: 'POST', body: JSON.stringify({booking_id: bid})});
  if (res.ok) { toast('Запись отменена'); loadDayData(); loadStats(); }
  else toast('Ошибка', false);
}

async function blockSlot(d, t) {
  await api('/api/admin/block', {method: 'POST', body: JSON.stringify({date: d, time: t})});
  toast('Слот заблокирован');
  loadDayData();
}

async function unblockSlot(d, t) {
  await api('/api/admin/unblock', {method: 'POST', body: JSON.stringify({date: d, time: t})});
  toast('Слот разблокирован');
  loadDayData();
}

// Init
loadStats();
loadCalendar();
loadDayData();
</script>
</body>
</html>
